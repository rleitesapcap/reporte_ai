version: "3.8"
services:

  # === PostgreSQL Evolution (separado) ===
  evo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: ${EVO_DB_PASS}
      POSTGRES_DB: evolution
    ports:
      - "5433:5432"
    volumes: [evo_pgdata:/var/lib/postgresql/data]

  # === Evolution API (WhatsApp Gateway) ===
  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: always
    ports: ["8080:8080"]
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:${EVO_DB_PASS}@evo-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evo-redis:6379
      # Logs
      - LOG_LEVEL=DEBUG
      - DEL_INSTANCE=false      
    depends_on: [evo-db, evo-redis]

  # === n8n (Orquestração) ===
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports: ["5678:5678"]
    environment:
      - WEBHOOK_URL=https://n8n.${DOMAIN}/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS}
    volumes: [n8n_data:/home/node/.n8n]

      
  # === Redis (cache Evolution) ===
  evo-redis:
    image: redis:7-alpine
    container_name: evo-redis
    restart: always

  # === MinIO (Object Storage) ===
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    volumes: [minio_data:/data]

volumes:
  n8n_data:
  reporte_pgdata:
  evo_pgdata:
  minio_data:
