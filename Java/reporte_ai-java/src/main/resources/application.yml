app:
  jwtSecret: ${JWT_SECRET:change-me-in-production-minimum-32-characters-required}
  jwtExpirationInMs: ${JWT_EXPIRATION_MS:86400000}  # 24 horas
  jwtRefreshExpirationInMs: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 dias

spring:
  application:
    name: reporteai

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reporteai_db}
    username: ${SPRING_DATASOURCE_USERNAME:reporteai}
    password: ${SPRING_DATASOURCE_PASSWORD:reporteai}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8082
  servlet:
    context-path: /
  error:
    include-message: on_param
    include-binding-errors: on_param
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    min-response-size: 1024

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    opus.social.app.reporteai: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/reporteai/app.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
