app:
  jwtSecret: mySecureSecretKeyForJWTTokenGenerationAndValidation123456789SuperSecure
  jwtExpirationInMs: 86400000  # 24 horas
  jwtRefreshExpirationInMs: 604800000  # 7 dias

spring:
  application:
    name: reporteai

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  datasource:
    url: jdbc:postgresql://localhost:5432/reporteai_db
    username: reporteai
    password: reporteai
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8082
  servlet:
    context-path: /

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    opus.social.app.reporteai: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
