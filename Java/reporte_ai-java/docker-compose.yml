version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reporteai_db
    environment:
      POSTGRES_DB: reporteai_db
      POSTGRES_USER: reporteai
      POSTGRES_PASSWORD: reporteai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reporteai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporteai"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: reporteai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - reporteai_network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  reporteai_network:
    driver: bridge
